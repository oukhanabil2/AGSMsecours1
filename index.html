<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AGSM - Gestion des Agents</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#34495e">
    <meta name="description" content="Système de Gestion des Agents AGSM">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .header-notification {
            position: relative;
            cursor: pointer;
            margin-left: auto;
        }
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- EN-TÊTE CORRIGÉ -->
        <div class="app-header">
            <div style="display:flex; align-items:center; gap:10px; flex:1;">
                <img src="logo.png" alt="Logo AGSM" style="height:45px; width:auto; border-radius:8px;">
                <div>
                    <h1 style="margin:0; font-size:1.2rem;">🏢 AGSM - Groupe ASW</h1>
                    <div id="sub-title" style="font-size:0.8rem; margin-top:4px;">Système de Gestion des Agents</div>
                </div>
            </div>
            <div class="header-notification" id="headerNotification">
                <span style="font-size:1.5rem;">🔔</span>
                <span id="notificationBadge" class="notification-badge">0</span>
            </div>
        </div>
        
        <div id="main-content"></div>
        <div class="app-footer">
            &copy; 2026 - AGSM Groupe ASW | Gestion des Agents
        </div>
    </div>
    <div id="snackbar"></div>
    
    <script src="app.js"></script>
    <script>
        console.log("Script principal chargé - attente de app.js");
        setTimeout(function() {
            console.log("Vérification après 2 secondes:");
            console.log("- typeof showNotificationsPanel:", typeof showNotificationsPanel);
            console.log("- typeof notifications:", typeof notifications);
            console.log("- currentUser:", currentUser ? currentUser.username : "null");
            var notifIcon = document.getElementById('headerNotification');
            if (notifIcon && typeof showNotificationsPanel === 'function') {
                notifIcon.onclick = function() {
                    showNotificationsPanel();
                };
                console.log("✅ Événement notification attaché");
            } else {
                console.log("❌ Impossible d'attacher l'événement - fonction non trouvée");
            }
        }, 2000);
  
   <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('✅ Service Worker enregistré', reg))
                .catch(err => console.error('❌ Erreur SW', err));
        });
    }
</script> 
    
</body>

</html>
